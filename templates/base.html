<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TestingPracticeApp{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">TestingPracticeApp</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav ms-auto gap-1">
            {% if is_logged_in() %}
              <li class="nav-item"><a class="nav-link" href="/products/">Products</a></li>
              <li class="nav-item"><a class="nav-link" href="/cart/">Cart</a></li>
              <li class="nav-item"><a class="nav-link" href="/orders/history">Orders</a></li>
              <li class="nav-item"><a class="nav-link" href="/profile/ping">Profile</a></li>
              <li class="nav-item">
                <form method="post" action="/reset" class="d-inline">
                  <button class="btn btn-sm btn-outline-danger ms-lg-2" type="submit">Reset</button>
                </form>
              </li>
              <li class="nav-item"><a class="nav-link" href="/auth/logout">Logout</a></li>
            {% else %}
              <li class="nav-item"><a class="nav-link" href="/auth/login">Login</a></li>
              <li class="nav-item"><a class="nav-link" href="/auth/register">Register</a></li>
            {% endif %}
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
