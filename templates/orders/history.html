<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Order history</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <nav class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Orders</h1>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="/products/">Products</a>
          <a class="btn btn-outline-secondary btn-sm" href="/cart/">Cart</a>
        </div>
      </nav>

      {% if message %}
        <div class="alert alert-info">{{ message }}</div>
      {% endif %}

      <div class="card shadow-sm">
        <div class="list-group list-group-flush">
          {% for o in orders %}
            <div class="list-group-item">
              <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-2">
                  <div class="fw-semibold">Order #{{ o.id }}</div>
                  <span class="badge text-bg-secondary">{{ o.status }}</span>
                </div>
                <div class="fw-semibold text-nowrap">${{ "%.2f"|format(o.total_cents / 100) }}</div>
              </div>
              <div class="text-muted small mt-1">{{ o.created_at }}</div>
            </div>
          {% else %}
            <div class="list-group-item text-center text-muted py-4">No orders yet.</div>
          {% endfor %}
        </div>
      </div>
    </div>
  </body>
</html>
