<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <nav class="d-flex justify-content-between align-items-center mb-3">
        <div class="d-flex align-items-center gap-2">
          <span class="badge text-bg-primary">Shop</span>
          <h1 class="h3 mb-0">Products</h1>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary btn-sm" href="/cart/">Cart</a>
          <a class="btn btn-outline-secondary btn-sm" href="/orders/history">Orders</a>
        </div>
      </nav>

      <form class="row g-2 align-items-end mb-3" method="get">
        <div class="col-12 col-md-4">
          <label class="form-label" for="category">Category</label>
          <select class="form-select" id="category" name="category">
            <option value="">All categories</option>
            {% for c in categories %}
              <option value="{{ c }}" {% if c == selected_category %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label" for="sort">Sort</label>
          <select class="form-select" id="sort" name="sort">
            <option value="price_asc" {% if selected_sort == 'price_asc' %}selected{% endif %}>Price: Low to high</option>
            <option value="price_desc" {% if selected_sort == 'price_desc' %}selected{% endif %}>Price: High to low</option>
          </select>
        </div>
        <div class="col-12 col-md-4">
          <button class="btn btn-primary w-100" type="submit">Apply</button>
        </div>
      </form>

      <div class="row g-3">
        {% for p in products %}
          <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 shadow-sm">
              <img
                src="/static/images/products/{{ p.id }}.svg"
                class="card-img-top bg-white"
                alt="{{ p.name }}"
                style="height: 180px; object-fit: contain;"
                onerror="this.onerror=null;this.src='/static/images/products/placeholder.svg';"
              >
              <div class="card-body d-flex flex-column">
                <div class="d-flex justify-content-between align-items-start gap-2">
                  <h2 class="h6 mb-1">
                    <a class="text-decoration-none" href="/products/{{ p.id }}">{{ p.name }}</a>
                  </h2>
                  <span class="badge text-bg-light border">{{ p.category }}</span>
                </div>
                <div class="text-muted small mb-2">{{ p.description }}</div>

                <div class="mt-auto">
                  <div class="d-flex justify-content-between align-items-center mb-2">
                    <div class="fw-semibold">${{ "%.2f"|format(p.price_cents / 100) }}</div>
                    <div class="text-muted small">{{ p.stock_qty }} in stock</div>
                  </div>
                  <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary btn-sm w-100" href="/products/{{ p.id }}">Details</a>
                    <form class="w-100" method="post" action="/cart/add">
                      <input type="hidden" name="product_id" value="{{ p.id }}">
                      <input type="hidden" name="quantity" value="1">
                      <button class="btn btn-primary btn-sm w-100" type="submit">Add</button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </div>
        {% else %}
          <div class="col-12">
            <div class="alert alert-secondary mb-0">No products found.</div>
          </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
