<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ product.name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <div class="container py-4">
      <div class="mb-3">
        <a class="btn btn-outline-secondary btn-sm" href="/products/">← Back to products</a>
      </div>

      <div class="card">
        <div class="card-body">
          <div class="row g-4 align-items-start">
            <div class="col-12 col-md-5">
              <div class="border rounded bg-white p-3">
                <img
                  src="/static/images/products/{{ product.id }}.svg"
                  alt="{{ product.name }}"
                  style="width: 100%; height: 260px; object-fit: contain;"
                  onerror="this.onerror=null;this.src='/static/images/products/placeholder.svg';"
                >
              </div>
            </div>
            <div class="col-12 col-md-7">
              <h1 class="h4">{{ product.name }}</h1>
              <div class="text-muted mb-2">{{ product.category }}</div>
              <p class="mb-3">{{ product.description }}</p>

              <div class="row g-3">
                <div class="col-6 col-md-4">
                  <div class="text-muted small">Price</div>
                  <div class="fw-semibold">${{ "%.2f"|format(product.price_cents / 100) }}</div>
                </div>
                <div class="col-6 col-md-4">
                  <div class="text-muted small">In stock</div>
                  <div class="fw-semibold">{{ product.stock_qty }}</div>
                </div>
                <div class="col-12 col-md-4">
                  <form method="post" action="/cart/add">
                    <input type="hidden" name="product_id" value="{{ product.id }}">
                    <input type="hidden" name="quantity" value="1">
                    <button class="btn btn-primary w-100" type="submit">Add to cart</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
